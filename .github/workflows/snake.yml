name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: taehyeonglim
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#5eead4&color_dots=#161b22,#0f766e,#0891b2,#6366f1,#a78bfa
            dist/github-contribution-grid-snake.svg?color_snake=#f59e0b&color_dots=#ebedf0,#99f6e4,#67e8f9,#60a5fa,#8b5cf6

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
