<svg xmlns="http://www.w3.org/2000/svg" width="580" height="260" viewBox="0 0 580 260" role="img" aria-labelledby="title desc">
  <title id="title">Education Policy Map</title><desc id="desc">An interactive regional education policy dashboard for South Korea.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071a24"/><stop offset="1" stop-color="#0c2e47"/></linearGradient><linearGradient id="sea" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#5eead4"/><stop offset="1" stop-color="#38bdf8"/></linearGradient></defs>
  <rect x="1" y="1" width="578" height="258" rx="24" fill="url(#bg)" stroke="#155e75" stroke-width="2"/>
