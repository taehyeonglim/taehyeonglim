<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Taehyeong Lim — Human × AI Co-Intelligence Systems</title>
  <desc id="desc">Light profile banner for AI co-scientist and multi-agent system builder Taehyeong Lim.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#eef8ff"/>
      <stop offset="1" stop-color="#f3efff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#0f766e"/>
      <stop offset="0.48" stop-color="#0284c7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#38bdf8" stop-opacity=".2"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#0f172a" stroke-opacity=".04"/>
    </pattern>
    <style>
      .node { animation: pulse 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin:center; }
      .node:nth-of-type(2) { animation-delay:-.8s; }
      .node:nth-of-type(3) { animation-delay:-1.6s; }
      .flow { stroke-dasharray:4 9; animation:flow 9s linear infinite; }
      @keyframes pulse { 0%,100% { opacity:.65; transform:scale(.94) } 50% { opacity:1; transform:scale(1.06) } }
      @keyframes flow { to { stroke-dashoffset:-130; } }
      @media (prefers-reduced-motion: reduce) { .node,.flow { animation:none } }
    </style>
  </defs>
  <rect x="1" y="1" width="1198" height="318" rx="28" fill="url(#bg)" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="318" rx="28" fill="url(#grid)"/>
  <circle cx="1025" cy="150" r="230" fill="url(#glow)"/>
  <rect x="68" y="55" width="158" height="4" rx="2" fill="url(#accent)"/>
  <text x="68" y="94" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="5">TAEHYEONG LIM, PH.D.</text>
  <text x="68" y="157" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="46" font-weight="800" letter-spacing="-1.2">HUMAN × AI</text>
  <text x="68" y="203" fill="url(#accent)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="35" font-weight="750" letter-spacing="-.5">CO-INTELLIGENCE SYSTEMS</text>
  <text x="70" y="239" fill="#40546b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Building multi-agent systems that think, verify, and work with humans.</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700">
    <rect x="68" y="264" width="142" height="32" rx="16" fill="#ccfbf1" stroke="#5eead4"/>
    <text x="139" y="285" fill="#0f766e" text-anchor="middle">AI CO-SCIENTIST</text>
    <rect x="220" y="264" width="174" height="32" rx="16" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="307" y="285" fill="#0369a1" text-anchor="middle">MULTI-AGENT SYSTEMS</text>
    <rect x="404" y="264" width="168" height="32" rx="16" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="488" y="285" fill="#6d28d9" text-anchor="middle">HUMAN-IN-THE-LOOP</text>
  </g>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <ellipse cx="992" cy="148" rx="166" ry="104" fill="none" stroke="url(#accent)" stroke-opacity=".13"/>
    <ellipse class="flow" cx="992" cy="148" rx="137" ry="82" fill="none" stroke="url(#accent)" stroke-opacity=".22" transform="rotate(-12 992 148)"/>
    <ellipse cx="992" cy="148" rx="110" ry="58" fill="none" stroke="#0284c7" stroke-opacity=".08" transform="rotate(18 992 148)"/>
    <g fill="none" stroke="url(#accent)" stroke-width="1.5">
      <path d="M850 82L930 148L850 216M1134 82L1054 148L1134 216" stroke-opacity=".23"/>
      <path d="M992 46L930 148L992 250M992 46L1054 148L992 250" stroke-opacity=".17"/>
      <path d="M963 130C980 117 1004 117 1021 130M963 166C980 179 1004 179 1021 166" stroke-opacity=".72" stroke-width="2"/>
    </g>
    <circle cx="930" cy="148" r="49" fill="#ccfbf1" fill-opacity=".38" stroke="#0f766e" stroke-opacity=".16"/>
    <circle cx="930" cy="148" r="34" fill="#ecfdf5" stroke="#0f766e" stroke-width="2"/>
    <circle cx="1054" cy="148" r="49" fill="#ede9fe" fill-opacity=".38" stroke="#7c3aed" stroke-opacity=".16"/>
    <circle cx="1054" cy="148" r="34" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="930" y="145" fill="#0f766e" text-anchor="middle" font-size="10" font-weight="750" letter-spacing="1.4">HUMAN</text>
    <text x="930" y="160" fill="#0f766e" text-anchor="middle" font-size="9" font-weight="600">INTENT</text>
    <text x="1054" y="145" fill="#6d28d9" text-anchor="middle" font-size="14" font-weight="850" letter-spacing="1.4">AI</text>
    <text x="1054" y="160" fill="#7c3aed" text-anchor="middle" font-size="9" font-weight="600">AGENCY</text>
    <circle cx="992" cy="148" r="14" fill="#f8fafc" stroke="#0284c7" stroke-width="2"/>
    <text x="992" y="154" fill="#0284c7" text-anchor="middle" font-size="17" font-weight="850">×</text>
    <g fill="#f8fafc" stroke-width="2.5">
      <circle class="node" cx="850" cy="82" r="7" stroke="#0f766e"/><circle class="node" cx="850" cy="216" r="7" stroke="#0284c7"/>
      <circle class="node" cx="1134" cy="82" r="7" stroke="#7c3aed"/><circle class="node" cx="1134" cy="216" r="7" stroke="#0284c7"/>
      <circle class="node" cx="992" cy="46" r="6" stroke="#0284c7"/><circle class="node" cx="992" cy="250" r="6" stroke="#0f766e"/>
    </g>
    <circle cx="825" cy="284" r="3" fill="#0f766e"/>
    <text x="838" y="288" fill="#64748b" font-size="10" font-weight="700" letter-spacing="2.2">CO-INTELLIGENCE LATTICE / 01</text>
  </g>
</svg>
