<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Taehyeong Lim — Human × AI Educational Technology</title>
  <desc id="desc">Light profile banner for researcher, teacher educator, and AI system builder Taehyeong Lim.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#eef8ff"/>
      <stop offset="1" stop-color="#f3efff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#0f766e"/>
      <stop offset="0.48" stop-color="#0284c7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#38bdf8" stop-opacity=".2"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#0f172a" stroke-opacity=".04"/>
    </pattern>
    <style>
      .node { animation: pulse 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin:center; }
      .node:nth-of-type(2) { animation-delay:-.8s; }
      .node:nth-of-type(3) { animation-delay:-1.6s; }
      @keyframes pulse { 0%,100% { opacity:.65; transform:scale(.94) } 50% { opacity:1; transform:scale(1.06) } }
      @media (prefers-reduced-motion: reduce) { .node { animation:none } }
    </style>
  </defs>
  <rect x="1" y="1" width="1198" height="318" rx="28" fill="url(#bg)" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="318" rx="28" fill="url(#grid)"/>
  <circle cx="1025" cy="150" r="230" fill="url(#glow)"/>
  <rect x="68" y="55" width="158" height="4" rx="2" fill="url(#accent)"/>
  <text x="68" y="94" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="5">TAEHYEONG LIM, PH.D.</text>
  <text x="68" y="157" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="46" font-weight="800" letter-spacing="-1.2">HUMAN × AI</text>
  <text x="68" y="203" fill="url(#accent)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="750" letter-spacing="-.5">EDUCATIONAL TECHNOLOGY</text>
  <text x="70" y="239" fill="#40546b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Designing learning systems where people and intelligent agents think better together.</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700">
    <rect x="68" y="264" width="112" height="32" rx="16" fill="#ccfbf1" stroke="#5eead4"/>
    <text x="124" y="285" fill="#0f766e" text-anchor="middle">RESEARCHER</text>
    <rect x="190" y="264" width="156" height="32" rx="16" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="268" y="285" fill="#0369a1" text-anchor="middle">TEACHER EDUCATOR</text>
    <rect x="356" y="264" width="160" height="32" rx="16" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="436" y="285" fill="#6d28d9" text-anchor="middle">AI SYSTEM BUILDER</text>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-opacity=".45" stroke-width="2">
    <path d="M818 161L906 88L1002 128L1102 69"/>
    <path d="M818 161L900 236L1002 190L1105 250"/>
    <path d="M906 88L1002 190L1102 69"/>
    <path d="M1002 128L900 236L1105 250"/>
  </g>
  <g fill="#f8fafc" stroke-width="3">
    <circle class="node" cx="818" cy="161" r="10" stroke="#0f766e"/>
    <circle class="node" cx="906" cy="88" r="9" stroke="#0284c7"/>
    <circle class="node" cx="900" cy="236" r="9" stroke="#7c3aed"/>
    <circle class="node" cx="1002" cy="128" r="12" stroke="#0f766e"/>
    <circle class="node" cx="1002" cy="190" r="8" stroke="#0284c7"/>
    <circle class="node" cx="1102" cy="69" r="8" stroke="#7c3aed"/>
    <circle class="node" cx="1105" cy="250" r="11" stroke="#0f766e"/>
  </g>
  <circle cx="1002" cy="159" r="58" fill="none" stroke="#0284c7" stroke-opacity=".14"/>
  <circle cx="1002" cy="159" r="82" fill="none" stroke="#7c3aed" stroke-opacity=".12" stroke-dasharray="5 9"/>
</svg>
