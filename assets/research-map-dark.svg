<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">AI co-scientist systems architecture</title>
  <desc id="desc">Six capabilities connected to the NERV multi-agent AI co-scientist.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#101735"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f766e"/><stop offset=".5" stop-color="#0369a1"/><stop offset="1" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#5eead4"/><stop offset=".5" stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#cbd5e1" opacity=".055"/></pattern>
    <style>
      .orbit { stroke-dasharray:5 10; animation: dash 18s linear infinite; }
      @keyframes dash { to { stroke-dashoffset:-240; } }
      @media (prefers-reduced-motion: reduce) { .orbit { animation:none } }
    </style>
  </defs>
  <rect x="1" y="1" width="1198" height="438" rx="26" fill="url(#bg)" stroke="#203c5c" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="438" rx="26" fill="url(#dots)"/>
  <text x="54" y="51" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="3">AI SYSTEMS ARCHITECTURE</text>
  <ellipse class="orbit" cx="600" cy="230" rx="390" ry="154" fill="none" stroke="url(#line)" stroke-opacity=".22"/>
  <g fill="none" stroke="url(#line)" stroke-opacity=".36" stroke-width="2">
    <path d="M600 230L280 126"/><path d="M600 230L260 300"/><path d="M600 230L600 92"/>
    <path d="M600 230L922 126"/><path d="M600 230L942 300"/><path d="M600 230L600 370"/>
  </g>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect x="430" y="171" width="340" height="118" rx="28" fill="url(#core)" stroke="#7dd3fc" stroke-opacity=".68" filter="url(#glow)"/>
    <text x="600" y="216" fill="#f8fafc" text-anchor="middle" font-size="16" font-weight="700" letter-spacing="2">NERV / MAGI</text>
    <text x="600" y="250" fill="#ffffff" text-anchor="middle" font-size="24" font-weight="800">AI Co-Scientist</text>
    <text x="600" y="273" fill="#dbeafe" text-anchor="middle" font-size="13">orchestrate · verify · remember · act</text>
    <g font-size="15" font-weight="750">
      <rect x="160" y="88" width="240" height="76" rx="20" fill="#0f2636" stroke="#5eead4" stroke-opacity=".58"/>
      <circle cx="194" cy="126" r="18" fill="#5eead4" fill-opacity=".15" stroke="#5eead4"/><text x="194" y="131" fill="#99f6e4" text-anchor="middle" font-size="11">MA</text>
      <text x="222" y="122" fill="#f1f5f9">Multi-Agent Orchestration</text><text x="222" y="143" fill="#94a3b8" font-size="12" font-weight="500">roles · routing · handoffs</text>
      <rect x="140" y="262" width="240" height="76" rx="20" fill="#151c37" stroke="#a78bfa" stroke-opacity=".58"/>
      <circle cx="174" cy="300" r="18" fill="#a78bfa" fill-opacity=".15" stroke="#a78bfa"/><text x="174" y="305" fill="#c4b5fd" text-anchor="middle" font-size="11">MEM</text>
      <text x="202" y="296" fill="#f1f5f9">Long-Term Memory</text><text x="202" y="317" fill="#94a3b8" font-size="12" font-weight="500">context · retrieval · continuity</text>
      <rect x="480" y="54" width="240" height="76" rx="20" fill="#0c2237" stroke="#38bdf8" stroke-opacity=".58"/>
      <circle cx="514" cy="92" r="18" fill="#38bdf8" fill-opacity=".15" stroke="#38bdf8"/><text x="514" y="97" fill="#7dd3fc" text-anchor="middle" font-size="11">TA</text>
      <text x="542" y="88" fill="#f1f5f9">Tool-Using Agents</text><text x="542" y="109" fill="#94a3b8" font-size="12" font-weight="500">actions · APIs · workflows</text>
      <rect x="802" y="88" width="240" height="76" rx="20" fill="#151c37" stroke="#a78bfa" stroke-opacity=".58"/>
      <circle cx="836" cy="126" r="18" fill="#a78bfa" fill-opacity=".15" stroke="#a78bfa"/><text x="836" y="131" fill="#c4b5fd" text-anchor="middle" font-size="11">AV</text>
      <text x="864" y="122" fill="#f1f5f9">Autonomous Validation</text><text x="864" y="143" fill="#94a3b8" font-size="12" font-weight="500">critique · consensus · checks</text>
      <rect x="822" y="262" width="240" height="76" rx="20" fill="#0f2636" stroke="#5eead4" stroke-opacity=".58"/>
      <circle cx="856" cy="300" r="18" fill="#5eead4" fill-opacity=".15" stroke="#5eead4"/><text x="856" y="305" fill="#99f6e4" text-anchor="middle" font-size="10">HITL</text>
      <text x="884" y="296" fill="#f1f5f9">Human in the Loop</text><text x="884" y="317" fill="#94a3b8" font-size="12" font-weight="500">judgment · control · oversight</text>
      <rect x="480" y="332" width="240" height="76" rx="20" fill="#0c2237" stroke="#38bdf8" stroke-opacity=".58"/>
      <circle cx="514" cy="370" r="18" fill="#38bdf8" fill-opacity=".15" stroke="#38bdf8"/><text x="514" y="375" fill="#7dd3fc" text-anchor="middle" font-size="11">RA</text>
      <text x="542" y="366" fill="#f1f5f9">Research Automation</text><text x="542" y="387" fill="#94a3b8" font-size="12" font-weight="500">literature · data · writing</text>
    </g>
  </g>
</svg>
