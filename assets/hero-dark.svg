<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Taehyeong Lim — Human × AI Educational Technology</title>
  <desc id="desc">Dark profile banner for researcher, teacher educator, and AI system builder Taehyeong Lim.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1b31"/>
      <stop offset="1" stop-color="#111b3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5eead4"/>
      <stop offset="0.48" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#38bdf8" stop-opacity=".28"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#cbd5e1" stroke-opacity=".045"/>
    </pattern>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .node { animation: pulse 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .node:nth-of-type(2) { animation-delay: -.8s; }
      .node:nth-of-type(3) { animation-delay: -1.6s; }
      .flow { stroke-dasharray: 4 9; animation: flow 9s linear infinite; }
      @keyframes pulse { 0%,100% { opacity:.65; transform:scale(.94) } 50% { opacity:1; transform:scale(1.06) } }
      @keyframes flow { to { stroke-dashoffset: -130; } }
      @media (prefers-reduced-motion: reduce) { .node,.flow { animation:none } }
    </style>
  </defs>
  <rect x="1" y="1" width="1198" height="318" rx="28" fill="url(#bg)" stroke="#244164" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="318" rx="28" fill="url(#grid)"/>
  <circle cx="1025" cy="150" r="230" fill="url(#glow)"/>
  <rect x="68" y="55" width="158" height="4" rx="2" fill="url(#accent)"/>
  <text x="68" y="94" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="5">TAEHYEONG LIM, PH.D.</text>
  <text x="68" y="157" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="46" font-weight="800" letter-spacing="-1.2">HUMAN × AI</text>
  <text x="68" y="203" fill="url(#accent)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="750" letter-spacing="-.5">EDUCATIONAL TECHNOLOGY</text>
  <text x="70" y="239" fill="#a8bdd3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Designing learning systems where people and intelligent agents think better together.</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700">
    <rect x="68" y="264" width="112" height="32" rx="16" fill="#5eead4" fill-opacity=".12" stroke="#5eead4" stroke-opacity=".45"/>
    <text x="124" y="285" fill="#99f6e4" text-anchor="middle">RESEARCHER</text>
    <rect x="190" y="264" width="156" height="32" rx="16" fill="#38bdf8" fill-opacity=".12" stroke="#38bdf8" stroke-opacity=".45"/>
    <text x="268" y="285" fill="#7dd3fc" text-anchor="middle">TEACHER EDUCATOR</text>
    <rect x="356" y="264" width="160" height="32" rx="16" fill="#a78bfa" fill-opacity=".12" stroke="#a78bfa" stroke-opacity=".45"/>
    <text x="436" y="285" fill="#c4b5fd" text-anchor="middle">AI SYSTEM BUILDER</text>
  </g>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <ellipse cx="992" cy="148" rx="166" ry="104" fill="none" stroke="url(#accent)" stroke-opacity=".13"/>
    <ellipse class="flow" cx="992" cy="148" rx="137" ry="82" fill="none" stroke="url(#accent)" stroke-opacity=".23" transform="rotate(-12 992 148)"/>
    <ellipse cx="992" cy="148" rx="110" ry="58" fill="none" stroke="#38bdf8" stroke-opacity=".08" transform="rotate(18 992 148)"/>
    <g fill="none" stroke="url(#accent)" stroke-width="1.5">
      <path d="M850 82L930 148L850 216M1134 82L1054 148L1134 216" stroke-opacity=".24"/>
      <path d="M992 46L930 148L992 250M992 46L1054 148L992 250" stroke-opacity=".18"/>
      <path d="M963 130C980 117 1004 117 1021 130M963 166C980 179 1004 179 1021 166" stroke-opacity=".75" stroke-width="2"/>
    </g>
    <circle cx="930" cy="148" r="49" fill="#5eead4" fill-opacity=".04" stroke="#5eead4" stroke-opacity=".18"/>
    <circle cx="930" cy="148" r="34" fill="#0b2530" stroke="#5eead4" stroke-width="2"/>
    <circle cx="1054" cy="148" r="49" fill="#a78bfa" fill-opacity=".04" stroke="#a78bfa" stroke-opacity=".18"/>
    <circle cx="1054" cy="148" r="34" fill="#211b3c" stroke="#a78bfa" stroke-width="2"/>
    <text x="930" y="145" fill="#99f6e4" text-anchor="middle" font-size="10" font-weight="750" letter-spacing="1.4">HUMAN</text>
    <text x="930" y="160" fill="#5eead4" text-anchor="middle" font-size="9" font-weight="600">INTENT</text>
    <text x="1054" y="145" fill="#c4b5fd" text-anchor="middle" font-size="14" font-weight="850" letter-spacing="1.4">AI</text>
    <text x="1054" y="160" fill="#a78bfa" text-anchor="middle" font-size="9" font-weight="600">AGENCY</text>
    <circle cx="992" cy="148" r="14" fill="#07111f" stroke="#38bdf8" stroke-width="2"/>
    <text x="992" y="154" fill="#7dd3fc" text-anchor="middle" font-size="17" font-weight="850">×</text>
    <g fill="#07111f" stroke-width="2.5">
      <circle class="node" cx="850" cy="82" r="7" stroke="#5eead4"/><circle class="node" cx="850" cy="216" r="7" stroke="#38bdf8"/>
      <circle class="node" cx="1134" cy="82" r="7" stroke="#a78bfa"/><circle class="node" cx="1134" cy="216" r="7" stroke="#38bdf8"/>
      <circle class="node" cx="992" cy="46" r="6" stroke="#38bdf8"/><circle class="node" cx="992" cy="250" r="6" stroke="#5eead4"/>
    </g>
    <circle cx="825" cy="284" r="3" fill="#5eead4"/>
    <text x="838" y="288" fill="#7890a8" font-size="10" font-weight="700" letter-spacing="2.2">CO-INTELLIGENCE LATTICE / 01</text>
  </g>
</svg>
