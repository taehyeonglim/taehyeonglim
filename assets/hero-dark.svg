<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Taehyeong Lim — Human × AI Educational Technology</title>
  <desc id="desc">Dark profile banner for researcher, teacher educator, and AI system builder Taehyeong Lim.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1b31"/>
      <stop offset="1" stop-color="#111b3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5eead4"/>
      <stop offset="0.48" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#38bdf8" stop-opacity=".28"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#cbd5e1" stroke-opacity=".045"/>
    </pattern>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .node { animation: pulse 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .node:nth-of-type(2) { animation-delay: -.8s; }
      .node:nth-of-type(3) { animation-delay: -1.6s; }
      @keyframes pulse { 0%,100% { opacity:.65; transform:scale(.94) } 50% { opacity:1; transform:scale(1.06) } }
      @media (prefers-reduced-motion: reduce) { .node { animation:none } }
    </style>
  </defs>
  <rect x="1" y="1" width="1198" height="318" rx="28" fill="url(#bg)" stroke="#244164" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="318" rx="28" fill="url(#grid)"/>
  <circle cx="1025" cy="150" r="230" fill="url(#glow)"/>
  <rect x="68" y="55" width="158" height="4" rx="2" fill="url(#accent)"/>
  <text x="68" y="94" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="5">TAEHYEONG LIM, PH.D.</text>
  <text x="68" y="157" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="46" font-weight="800" letter-spacing="-1.2">HUMAN × AI</text>
  <text x="68" y="203" fill="url(#accent)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="750" letter-spacing="-.5">EDUCATIONAL TECHNOLOGY</text>
  <text x="70" y="239" fill="#a8bdd3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Designing learning systems where people and intelligent agents think better together.</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700">
    <rect x="68" y="264" width="112" height="32" rx="16" fill="#5eead4" fill-opacity=".12" stroke="#5eead4" stroke-opacity=".45"/>
    <text x="124" y="285" fill="#99f6e4" text-anchor="middle">RESEARCHER</text>
    <rect x="190" y="264" width="156" height="32" rx="16" fill="#38bdf8" fill-opacity=".12" stroke="#38bdf8" stroke-opacity=".45"/>
    <text x="268" y="285" fill="#7dd3fc" text-anchor="middle">TEACHER EDUCATOR</text>
    <rect x="356" y="264" width="160" height="32" rx="16" fill="#a78bfa" fill-opacity=".12" stroke="#a78bfa" stroke-opacity=".45"/>
    <text x="436" y="285" fill="#c4b5fd" text-anchor="middle">AI SYSTEM BUILDER</text>
  </g>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <ellipse cx="985" cy="148" rx="150" ry="100" fill="none" stroke="url(#accent)" stroke-opacity=".18" stroke-dasharray="5 8"/>
    <g fill="none" stroke="url(#accent)" stroke-opacity=".45" stroke-width="2">
      <path d="M985 50L948 105M985 50L1022 105M835 148L902 148M1135 148L1068 148M985 248L948 191M985 248L1022 191"/>
      <path d="M865 88C900 45 955 30 985 48M1105 88C1070 45 1015 30 985 48M865 208C900 250 955 265 985 248M1105 208C1070 250 1015 265 985 248" stroke-opacity=".24"/>
    </g>
    <circle cx="948" cy="148" r="50" fill="#5eead4" fill-opacity=".11" stroke="#5eead4" stroke-width="2"/>
    <circle cx="1022" cy="148" r="50" fill="#a78bfa" fill-opacity=".11" stroke="#a78bfa" stroke-width="2"/>
    <text x="942" y="143" fill="#99f6e4" text-anchor="middle" font-size="12" font-weight="800" letter-spacing="1">HUMAN</text>
    <text x="1028" y="143" fill="#c4b5fd" text-anchor="middle" font-size="15" font-weight="850" letter-spacing="1">AI</text>
    <circle cx="985" cy="148" r="18" fill="#07111f" stroke="#38bdf8" stroke-width="2"/>
    <text x="985" y="155" fill="#7dd3fc" text-anchor="middle" font-size="20" font-weight="800">×</text>
    <g fill="#07111f" stroke-width="3">
      <circle class="node" cx="985" cy="50" r="9" stroke="#38bdf8"/>
      <circle class="node" cx="1135" cy="148" r="9" stroke="#a78bfa"/>
      <circle class="node" cx="985" cy="248" r="9" stroke="#5eead4"/>
      <circle class="node" cx="835" cy="148" r="9" stroke="#5eead4"/>
    </g>
    <g fill="#91a8bf" font-size="10" font-weight="750" letter-spacing="1.4">
      <text x="985" y="29" text-anchor="middle">RESEARCH</text>
      <text x="1135" y="174" text-anchor="middle">BUILD</text>
      <text x="985" y="276" text-anchor="middle">TEACH</text>
      <text x="835" y="174" text-anchor="middle">LEARN</text>
    </g>
    <text x="985" y="306" fill="#7890a8" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="2.4">CO-INTELLIGENCE LOOP</text>
  </g>
</svg>
