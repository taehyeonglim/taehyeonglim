  <text x="1096" y="88" text-anchor="middle" font-size="9.5" font-weight="800" letter-spacing="1" fill="#dc2626">PUBLISHED 2026.04</text>
  <text x="1160" y="150" text-anchor="end" font-size="11.5" font-weight="800" letter-spacing="1" fill="#17337a">READ THE PAPER <tspan fill="#dc2626">→</tspan></text>
