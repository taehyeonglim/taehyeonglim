<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200" role="img" aria-labelledby="title desc">
  <title id="title">Field results — peer-reviewed co-scientist research</title>
  <desc id="desc">Whiteprint log sheet of peer-reviewed research produced with the NERV co-scientist system. FIG.04 of 5.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f7fd"/>
    </linearGradient>
    <pattern id="gridFine" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M8 0H0V8" fill="none" stroke="#1e40af" stroke-opacity=".06"/>
    </pattern>
    <pattern id="gridBold" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1e40af" stroke-opacity=".09"/>
    </pattern>
    <style>
      text { font-family: ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace; }
      .scan { animation: scan 16s linear infinite; }
      @keyframes scan { to { transform: translateX(1180px); } }
      @media (prefers-reduced-motion: reduce) { .scan { animation: none; } }
    </style>
  </defs>
  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#gridFine)"/>
  <rect width="1200" height="200" fill="url(#gridBold)"/>
  <rect x="2" y="2" width="1196" height="196" fill="none" stroke="#1e40af" stroke-opacity=".55" stroke-width="2.5"/>
  <rect x="10" y="10" width="1180" height="180" fill="none" stroke="#1e40af" stroke-opacity=".25"/>
