  <text x="77" y="88" text-anchor="middle" font-size="9" font-weight="800" letter-spacing="1" fill="#2c4d99">R-01</text>
  <text x="120" y="92" font-size="15" font-weight="700" fill="#17337a">Building an agentic AI-based co-researcher system:</text>
  <text x="120" y="114" font-size="15" font-weight="700" fill="#17337a">An autoethnographic reflection of an educational technology researcher</text>
