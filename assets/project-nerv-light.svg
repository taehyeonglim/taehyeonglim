<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="270" viewBox="0 0 1200 270" role="img" aria-labelledby="title desc">
  <title id="title">NERV System Whitepaper</title>
  <desc id="desc">Whiteprint card for NERV, a 45-agent AI co-scientist system, with MAGI validation stamp. FIG.03 of 5.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f7fd"/>
    </linearGradient>
    <pattern id="gridFine" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M8 0H0V8" fill="none" stroke="#1e40af" stroke-opacity=".06"/>
    </pattern>
    <pattern id="gridBold" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1e40af" stroke-opacity=".09"/>
    </pattern>
    <style>
      text { font-family: ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace; }
      .flow { stroke-dasharray: 5 7; animation: flow 12s linear infinite; }
      .scan { animation: scan 16s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -96; } }
      @keyframes scan { to { transform: translateX(1180px); } }
      @media (prefers-reduced-motion: reduce) { .flow, .scan { animation: none; } }
    </style>
  </defs>
  <rect width="1200" height="270" fill="url(#bg)"/>
  <rect width="1200" height="270" fill="url(#gridFine)"/>
  <rect width="1200" height="270" fill="url(#gridBold)"/>
  <rect x="2" y="2" width="1196" height="266" fill="none" stroke="#1e40af" stroke-opacity=".55" stroke-width="2.5"/>
  <rect x="10" y="10" width="1180" height="250" fill="none" stroke="#1e40af" stroke-opacity=".25"/>
  <g stroke="#1e40af" stroke-opacity=".3" stroke-width="6" stroke-dasharray="1 39">
    <line x1="10" y1="13" x2="1190" y2="13"/>
    <line x1="10" y1="257" x2="1190" y2="257"/>
    <line x1="13" y1="10" x2="13" y2="260"/>
    <line x1="1187" y1="10" x2="1187" y2="260"/>
  </g>
  <rect class="scan" x="10" y="10" width="1" height="250" fill="#1e40af" fill-opacity=".12"/>
  <text x="1170" y="40" text-anchor="end" font-size="9.5" letter-spacing="2" fill="#6981b8">SHEET 03 / 05</text>
  <path d="M46 40V230" stroke="#dc2626" stroke-width="3"/>
  <path d="M42 40h8M42 230h8" stroke="#dc2626" stroke-width="1.5"/>
  <text x="72" y="72" font-size="13" font-weight="800" letter-spacing="3" fill="#dc2626">AI CO-SCIENTIST SYSTEM</text>
  <text x="72" y="122" font-size="44" font-weight="900" fill="#17337a">NERV<tspan dx="16" font-size="21" font-weight="700" fill="#2c4d99">SYSTEM WHITEPAPER</tspan></text>
  <text x="74" y="156" font-size="16.5" fill="#2c4d99">A 45-agent AI co-scientist for complex research workflows.</text>
  <text x="74" y="182" font-size="12.5" fill="#6981b8">Role-based agents · autonomous cross-validation · research workflow orchestration</text>
  <g font-size="11" font-weight="700" letter-spacing="1">
    <rect x="74" y="204" width="132" height="28" fill="#dc2626" fill-opacity=".07" stroke="#dc2626" stroke-opacity=".7"/>
    <text x="140" y="222" text-anchor="middle" fill="#dc2626">45 AI AGENTS</text>
    <rect x="216" y="204" width="150" height="28" fill="#1e40af" fill-opacity=".05" stroke="#1e40af" stroke-opacity=".55"/>
    <text x="291" y="222" text-anchor="middle" fill="#2c4d99">7 SYSTEM ROLES</text>
    <rect x="376" y="204" width="164" height="28" fill="#1e40af" fill-opacity=".05" stroke="#1e40af" stroke-opacity=".55"/>
    <text x="458" y="222" text-anchor="middle" fill="#2c4d99">MAGI VALIDATION</text>
  </g>
  <g fill="none" stroke="#1e40af">
    <circle cx="940" cy="136" r="94" stroke-opacity=".18" stroke-dasharray="4 8"/>
    <g class="flow" stroke-opacity=".6">
      <path d="M940 104V66"/>
      <path d="M965 116L995 92"/>
      <path d="M971 143L1008 152"/>
      <path d="M954 165L970 199"/>
      <path d="M926 165L910 199"/>
      <path d="M909 143L872 152"/>
      <path d="M915 116L885 92"/>
    </g>
    <circle cx="940" cy="136" r="32" stroke-width="2"/>
    <g stroke-opacity=".8">
      <circle cx="940" cy="58" r="8"/>
      <circle cx="1001" cy="87" r="8"/>
      <circle cx="1016" cy="153" r="8"/>
      <circle cx="974" cy="206" r="8"/>
      <circle cx="906" cy="206" r="8"/>
      <circle cx="864" cy="153" r="8"/>
      <circle cx="879" cy="87" r="8"/>
    </g>
    <path d="M856 153H800" stroke="#dc2626" stroke-opacity=".8"/>
  </g>
  <text x="940" y="132" text-anchor="middle" font-size="10.5" font-weight="800" letter-spacing="1" fill="#17337a">RESEARCH</text>
  <text x="940" y="146" text-anchor="middle" font-size="9" letter-spacing="1" fill="#6981b8">CORE</text>
  <text x="796" y="157" text-anchor="end" font-size="10.5" font-weight="700" letter-spacing="1" fill="#dc2626">ø 7 ROLES</text>
  <g transform="translate(1092 84) rotate(-8)" opacity=".92">
    <rect x="-78" y="-26" width="156" height="52" rx="6" fill="none" stroke="#dc2626" stroke-width="2.5"/>
    <rect x="-72" y="-20" width="144" height="40" rx="4" fill="none" stroke="#dc2626" stroke-opacity=".5"/>
    <text x="0" y="-2" text-anchor="middle" font-size="17" font-weight="900" letter-spacing="4" fill="#dc2626">MAGI</text>
    <text x="0" y="14" text-anchor="middle" font-size="10" letter-spacing="3" fill="#dc2626">VALIDATED</text>
  </g>
  <text x="1160" y="228" text-anchor="end" font-size="11.5" font-weight="800" letter-spacing="1" fill="#17337a">READ THE WHITEPAPER <tspan fill="#dc2626">→</tspan></text>
  <g font-size="8">
    <rect x="544" y="234" width="322" height="24" fill="none" stroke="#1e40af" stroke-opacity=".5"/>
    <path d="M608 234v24M756 234v24M816 234v24" stroke="#1e40af" stroke-opacity=".35"/>
    <text x="576" y="249" text-anchor="middle" font-weight="800" letter-spacing="1" fill="#dc2626">FIG.03</text>
    <text x="682" y="249" text-anchor="middle" fill="#2c4d99">DWG NO. TL-2026-03</text>
    <text x="786" y="249" text-anchor="middle" fill="#2c4d99">REV 2026.07</text>
    <text x="841" y="249" text-anchor="middle" fill="#2c4d99">SCALE 1:1</text>
  </g>
</svg>
